name: 🚀 CI/CD — Validation + Deploy NewsFlow FR

on:
  push:
    branches: [main]
  workflow_dispatch:        # permet lancement manuel

jobs:
  # ─────────────────────────────
  # JOB 1 — Validation du code
  # ─────────────────────────────
  validate:
    name: ✅ Validation HTML/CSS/JS
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🔍 Vérifier index.html existe
        run: |
          if [ ! -f "index.html" ]; then
            echo "❌ index.html manquant !"
            exit 1
          fi
          echo "✅ index.html trouvé — $(wc -l < index.html) lignes"

      - name: 🛡️ Audit sécurité basique
        run: |
          echo "🔍 Scan secrets hardcodés..."
          if grep -rn "api_key\|password\|secret\|token" --include="*.html" --include="*.js" .; then
            echo "⚠️ Attention : vérifiez les secrets détectés"
          else
            echo "✅ Aucun secret détecté"
          fi

      - name: 📊 Rapport taille fichiers
        run: |
          echo "📁 Taille des fichiers :"
          find . -name "*.html" -o -name "*.css" -o -name "*.js" | \
          xargs ls -lh 2>/dev/null | awk '{print $5, $9}'

  # ─────────────────────────────
  # JOB 2 — Nettoyage + Deploy
  # ─────────────────────────────
  deploy:
    name: 🌐 Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: validate           # attend validation ✅
    
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # historique complet

      - name: 🧹 Nettoyer anciens fichiers de build
        run: |
          echo "🗑️ Nettoyage des fichiers temporaires..."
          find . -name "*.tmp" -delete
          find . -name "*.log" -delete
          find . -name ".DS_Store" -delete
          echo "✅ Nettoyage terminé"

      - name: 📝 Générer metadata build
        run: |
          echo "Générer infos de build..."
          cat > build-info.json << EOF
          {
            "version": "${{ github.sha }}",
            "date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "branch": "${{ github.ref_name }}",
            "commit": "${{ github.event.head_commit.message }}"
          }
          EOF
          cat build-info.json

      - name: 🚀 Deploy sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: |
            .github
            .clinerules
            agents
            memory-bank
            *.md
            *.json
          commit_message: |
            🚀 Deploy automatique — ${{ github.event.head_commit.message }}

      - name: 📣 Notification Telegram
        if: success()
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *NewsFlow FR déployé !*
          
          🌐 URL : https://webfree69.github.io/nabil
          📝 Commit : ${{ github.event.head_commit.message }}
          ⏰ Date : $(date '+%d/%m/%Y %H:%M')"

      - name: 📣 Notification échec Telegram
        if: failure()
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *Déploiement échoué !*
          
          📝 Commit : ${{ github.event.head_commit.message }}
          🔍 Vérifiez : https://github.com/webfree69/nabil/actions"
