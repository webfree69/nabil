<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="60">
  <title>Trading Dashboard — nabilh.eu</title>
  <style>
    :root {
      --bg-primary:  #0d1117;
      --bg-card:     #161b22;
      --bg-hover:    #1c2128;
      --border:      #30363d;
      --text-primary:#e6edf3;
      --text-muted:  #8b949e;
      --green:       #3fb950;
      --green-bg:    #0d2e1a;
      --red:         #f85149;
      --red-bg:      #3d1a1a;
      --blue:        #58a6ff;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Segoe UI', system-ui, sans-serif;
      background:var(--bg-primary);
      color:var(--text-primary);
      min-height:100vh;
    }
    header {
      background:var(--bg-card);
      border-bottom:1px solid var(--border);
      padding:16px 32px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
    }
    .logo { font-size:1.1rem; font-weight:700; }
    .logo span { color:var(--blue); }
    .header-right { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    .updated-header { font-size:0.72rem; color:var(--text-muted); }
    .market-badge {
      display:flex; align-items:center; gap:8px;
      padding:6px 14px; border-radius:20px;
      font-size:0.8rem; font-weight:600; border:1px solid;
    }
    .market-badge.open   { background:var(--green-bg); color:var(--green); border-color:var(--green); }
    .market-badge.closed { background:var(--red-bg);   color:var(--red);   border-color:var(--red); }
    .dot { width:8px; height:8px; border-radius:50%; }
    .market-badge.open .dot { background:var(--green); animation:pulse 1.5s infinite; }
    .market-badge.closed .dot { background:var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
