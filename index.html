<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Trading Dashboard - nabilh.eu</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #333; margin: 10px; display: inline-block; min-width: 300px; }
        .error-msg { color: #ff1744; font-weight: bold; font-size: 0.8rem; }
        h1 { color: #00e676; }
    </style>
</head>
<body>
    <h1>Terminal de Trading</h1>
    
    <div class="card">
        <h2>État du Serveur</h2>
        <p id="status">Vérification de la connexion au VPS...</p>
    </div>

    <div class="card">
        <h2>Portefeuille</h2>
        <div id="portfolio-data">Chargement des 500 $...</div>
    </div>

    <script>
        // On teste le port 5001 sur ton IP
        const API_URL = 'http://150.241.230.207:5001/api/portfolio';

        async function testConnection() {
            const statusEl = document.getElementById('status');
            const portEl = document.getElementById('portfolio-data');

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Réponse serveur non valide');
                const data = await response.json();
                
                statusEl.innerHTML = "✅ Connecté au VPS";
                portEl.innerHTML = `Capital : ${data.capital_actuel} $`;
            } catch (err) {
                statusEl.innerHTML = "❌ Erreur de Connexion";
                portEl.innerHTML = `<span class="error-msg">Impossible de contacter le VPS sur le port 5001.<br>
                Cause probable : Blocage HTTPS/HTTP (Mixed Content).</span>`;
                console.error(err);
            }
        }

        testConnection();
    </script>
</body>
</html>
