<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Bot Dashboard — NabilH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary:   #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary:  #21262d;
            --bg-card:      #1c2128;
            --text-primary: #e6edf3;
            --text-secondary:#7d8590;
            --accent-blue:  #388bfd;
            --accent-green: #3fb950;
            --accent-red:   #f85149;
            --accent-orange:#d29922;
            --accent-purple:#bc8cff;
            --border:       #30363d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        /* ===== LAYOUT ===== */
        .container { max-width: 960px; margin: 0 auto; }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 16px;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-logo { font-size: 26px; }
        .header-title { font-size: 20px; font-weight: 700; color: var(--text-primary); }
        .header-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

        /* ===== CLOCK BAR ===== */
        .clock-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 20px;
            margin-bottom: 16px;
            justify-content: space-between;
        }

        .clock-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .clock-city { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .clock-time { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }

        .clock-divider { width: 1px; height: 36px; background: var(--border); }

        .market-badge {
            padding: 5px 14px; border-radius: 20px; font-size: 12px;
            font-weight: 600; display: flex; align-items: center; gap: 6px;
        }
        .market-open   { background:#3fb95018; color:var(--accent-green); border:1px solid #3fb95040; }
        .market-closed { background:#f8514918; color:var(--accent-red);   border:1px solid #f8514940; }
        .market-pre    { background:#d2992218; color:var(--accent-orange); border:1px solid #d2992240; }

        .mkt-dot { width:7px; height:7px; border-radius:50%; }
        .mkt-dot-open   { background:var(--accent-green); animation: blink 1.5s infinite; }
        .mkt-dot-closed { background:var(--accent-red); }
        .mkt-dot-pre    { background:var(--accent-orange); animation: blink 2s infinite; }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* ===== CONNECTION STATUS ===== */
        .conn-status { display:flex; align-items:center; gap:6px; font-size:12px; }
        .conn-dot { width:7px; height:7px; border-radius:50%; }
        .conn-online  { background:var(--accent-green); box-shadow:0 0 6px var(--accent-green); }
        .conn-offline { background:var(--accent-red); }

        /* ===== STATUS BADGE ===== */
        .status-badge {
            display:inline-flex; align-items:center; gap:6px;
            padding:4px 14px; border-radius:20px; font-size:12px;
            font-weight:700; text-transform:uppercase; letter-spacing:.5px;
        }
        .status-running {
            background:#3fb95018; color:var(--accent-green); border:1px solid #3fb95040;
            animation: pulse-g 2s infinite;
        }
        .status-stopped { background:#f8514918; color:var(--accent-red); border:1px solid #f8514940; }
        @keyframes pulse-g {
            0% { box-shadow:0 0 0 0 rgba(63,185,80,.4); }
            70%{ box-shadow:0 0 0 8px rgba(63,185,80,0); }
            100%{ box-shadow:0 0 0 0 rgba(63,185,80,0); }
        }

        /* ===== STATS GRID ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            transition: transform .15s, border-color .15s;
        }
        .stat-card:hover { transform:translateY(-2px); border-color:var(--accent-blue); }
        .stat-label { font-size:11px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
        .stat-value { font-size:24px; font-weight:700; }
        .profit { color:var(--accent-green); }
        .loss   { color:var(--accent-red); }

        /* ===== SECTION TITLES ===== */
        .section-title {
            display:flex; align-items:center; gap:10px;
            font-size:14px; font-weight:600; color:var(--text-secondary);
            text-transform:uppercase; letter-spacing:.6px;
            margin:20px 0 12px; padding-left:12px;
            border-left:3px solid var(--accent-blue);
        }

        /* ===== TABLES ===== */
        .table-wrap { overflow-x:auto; border-radius:8px; background:var(--bg-tertiary); border:1px solid var(--border); }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:12px 14px; text-align:left; border-bottom:1px solid var(--border); }
        th { color:var(--text-secondary); font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.5px; background:rgba(0,0,0,.2); }
        td { font-size:13px; }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:rgba(255,255,255,.02); }

        /* ===== ORDER BADGES ===== */
        .o-badge { padding:3px 9px; border-radius:4px; font-size:10px; font-weight:700; text-transform:uppercase; display:inline-block; }
        .o-filled          { background:#3fb95018; color:var(--accent-green); border:1px solid #3fb95040; }
        .o-partially_filled{ background:#d2992218; color:var(--accent-orange); border:1px solid #d2992240; }
        .o-new,.o-accepted { background:#388bfd18; color:var(--accent-blue);   border:1px solid #388bfd40; }
        .o-canceled,.o-expired,.o-rejected { background:#f8514918; color:var(--accent-red); border:1px solid #f8514940; }
        .side-buy  { color:var(--accent-green); font-weight:700; }
        .side-sell { color:var(--accent-red);   font-weight:700; }
        @keyframes newRow { 0%,100%{background:transparent} 50%{background:rgba(56,139,253,.06)} }
        .row-new { animation: newRow 1.5s ease 3; }

        /* ===== AI BLOCK ===== */
        .ai-box {
            background: linear-gradient(135deg, #161b22 0%, #1c2128 100%);
            border: 1px solid var(--accent-blue);
            border-radius: 10px;
            padding: 20px;
            margin: 16px 0;
            box-shadow: 0 0 20px rgba(56,139,253,.08);
        }
        .ai-inner { display:flex; align-items:flex-start; gap:20px; }
        .ai-brain-wrap { flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:6px; }
        .brain-container { position:relative; width:64px; height:64px; }
        .brain-svg { width:64px; height:64px; }
        .brain-idle .brain-fill     { fill:#1e3a5f; }
        .brain-thinking .brain-fill { fill:var(--accent-orange); animation:glow .8s alternate infinite; }
        .brain-done .brain-fill     { fill:#1a4731; }
        .brain-fill, .brain-pulse   { transition: fill .4s; }
        .brain-idle .brain-pulse     { stroke:var(--accent-blue); stroke-width:1; opacity:.3; fill:none; }
        .brain-thinking .brain-pulse { stroke:var(--accent-orange); stroke-width:2; fill:none; animation:bpulse .8s infinite; }
        .brain-done .brain-pulse     { stroke:var(--accent-green); stroke-width:1.5; fill:none; animation:bpulse 2s infinite; }
        @keyframes glow { from{filter:brightness(1)} to{filter:brightness(1.4)} }
        @keyframes bpulse { 0%,100%{opacity:.2;transform:scale(1)} 50%{opacity:.9;transform:scale(1.1)} }

        .brain-wave { position:absolute; border-radius:50%; border:1px solid; opacity:0; }
        .brain-thinking-waves .wave1 { width:76px;height:76px;top:-6px;left:-6px;  border-color:var(--accent-orange);animation:wo 1.2s ease-out infinite; }
        .brain-thinking-waves .wave2 { width:90px;height:90px;top:-13px;left:-13px;border-color:var(--accent-orange);animation:wo 1.2s ease-out .4s infinite; }
        .brain-thinking-waves .wave3 { width:104px;height:104px;top:-20px;left:-20px;border-color:var(--accent-orange);animation:wo 1.2s ease-out .8s infinite; }
        @keyframes wo { 0%{opacity:.8;transform:scale(.9)} 100%{opacity:0;transform:scale(1.3)} }

        .brain-status { font-size:9px; text-transform:uppercase; letter-spacing:1px; font-weight:700; }
        .brain-s-idle     { color:#4a5568; }
        .brain-s-thinking { color:var(--accent-orange); animation:blink 1.5s infinite; }
        .brain-s-done     { color:var(--accent-green); }

        .ai-content { flex:1; }
        .ai-title { font-size:11px; color:var(--accent-blue); text-transform:uppercase; letter-spacing:.8px; font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
        .ai-text  { font-size:14px; line-height:1.6; margin-bottom:12px; }
        .dec-badge { display:inline-block; padding:3px 12px; border-radius:20px; font-size:12px; font-weight:700; margin-right:10px; letter-spacing:.5px; }
        .dec-ACHAT  { background:#3fb95018; color:var(--accent-green); border:1px solid #3fb95040; }
        .dec-VENTE  { background:#f8514918; color:var(--accent-red);   border:1px solid #f8514940; }
        .dec-ATTENTE{ background:#d2992218; color:var(--accent-orange); border:1px solid #d2992240; }
        .dec-STOP   { background:#bc8cff18; color:var(--accent-purple); border:1px solid #bc8cff40; }

        .conf-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
        .conf-label { font-size:10px; color:var(--text-secondary); text-transform:uppercase; min-width:55px; }
        .conf-bar-wrap { flex:1; height:6px; background:var(--bg-tertiary); border-radius:3px; overflow:hidden; }
        .conf-bar { height:6px; border-radius:3px; transition:width 1s ease; width:0%; }

        .next-cycle { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--text-secondary); background:rgba(0,0,0,.2); padding:8px 12px; border-radius:6px; }
        .nc-bar { flex:1; height:3px; background:var(--bg-tertiary); border-radius:2px; overflow:hidden; }
        .nc-fill { height:100%; background:var(--accent-blue); border-radius:2px; transition:width 1s linear; }

        /* ===== CHART ===== */
        .chart-tabs { display:flex; gap:8px; margin-bottom:12px; }
        .chart-tab { padding:5px 14px; border-radius:20px; font-size:11px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text-secondary); transition:.2s; }
        .chart-tab.active { background:var(--accent-blue); border-color:var(--accent-blue); color:#fff; }
        .chart-wrap { position:relative; height:200px; background:var(--bg-tertiary); border:1px solid var(--border); border-radius:8px; padding:12px; }

        /* ===== NEWS FEED ===== */
        .news-list { display:flex; flex-direction:column; gap:0; }
        .news-item {
            display:flex; align-items:flex-start; gap:14px;
            padding:12px 0; border-bottom:1px solid var(--border);
            transition: background .15s;
        }
        .news-item:last-child { border-bottom:none; }
        .news-item:hover { background:rgba(255,255,255,.02); border-radius:6px; padding:12px 8px; margin:0 -8px; }
        .news-bullet { flex-shrink:0; margin-top:6px; width:6px; height:6px; border-radius:50%; background:var(--accent-blue); }
        .news-body { flex:1; min-width:0; }
        .news-title { font-size:13px; line-height:1.4; color:var(--text-primary); margin-bottom:4px; }
        .news-title a { color:inherit; text-decoration:none; }
        .news-title a:hover { color:var(--accent-blue); text-decoration:underline; }
        .news-meta { display:flex; align-items:center; gap:10px; }
        .news-source { font-size:11px; color:var(--accent-blue); font-weight:600; }
        .news-time   { font-size:11px; color:var(--text-secondary); }
        .news-empty  { font-size:13px; color:var(--text-secondary); font-style:italic; padding:16px 0; }
        .news-loading{ display:flex; align-items:center; gap:10px; font-size:13px; color:var(--text-secondary); padding:16px 0; }

        /* ===== MISC ===== */
        .error-msg { color:var(--accent-red); text-align:center; padding:40px; background:rgba(248,81,73,.06); border-radius:8px; border:1px solid #f8514940; }
        .refresh    { font-size:11px; color:var(--text-secondary); margin-top:16px; display:flex; justify-content:space-between; align-items:center; }
        .refresh-btn { background:var(--bg-tertiary); border:1px solid var(--border); color:var(--text-primary); padding:5px 12px; border-radius:20px; cursor:pointer; font-size:11px; transition:.2s; }
        .refresh-btn:hover { background:var(--accent-blue); border-color:var(--accent-blue); }

        .loading { text-align:center; padding:50px; }
        .spinner { border:2px solid var(--bg-tertiary); border-top:2px solid var(--accent-blue); border-radius:50%; width:32px; height:32px; animation:spin 1s linear infinite; margin:0 auto 16px; }
        @keyframes spin { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }

        @media(max-width:600px) {
            .clock-bar { flex-direction:column; align-items:stretch; }
            .clock-divider { display:none; }
            .ai-inner { flex-direction:column; align-items:center; }
            .stats-grid { grid-template-columns:1fr 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
<div class="card">

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <div class="header-logo">🤖</div>
            <div>
                <div class="header-title">Trading Bot Dashboard</div>
                <div class="header-sub">NabilH · SPY Algo v3.0</div>
            </div>
        </div>
        <div class="conn-status" id="conn-status">
            <span class="conn-dot conn-offline" id="conn-dot"></span>
            <span id="conn-text">Déconnecté</span>
        </div>
    </div>

    <!-- CLOCK BAR -->
    <div class="clock-bar">
        <div class="clock-item">
            <div class="clock-city">🇫🇷 Paris</div>
            <div class="clock-time" id="clk-paris">--:--:--</div>
        </div>
        <div class="clock-divider"></div>
        <div class="clock-item">
            <div class="clock-city">🇺🇸 New York</div>
            <div class="clock-time" id="clk-ny">--:--:--</div>
        </div>
        <div class="clock-divider"></div>
        <div id="mkt-badge"></div>
    </div>

    <!-- MAIN -->
    <div id="main">
        <div class="loading">
            <div class="spinner"></div>
            <p style="color:var(--text-secondary)">Connexion au serveur...</p>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="refresh" id="footer-time">
        <span>--:--:--</span>
        <button class="refresh-btn" onclick="forceRefresh()">↻ Actualiser</button>
    </div>

</div>
</div>

<script>
// ============================================================
// CONFIGURATION — mettre ici l'URL de votre API Flask
// ============================================================
const API_URL          = 'http://localhost:5000';
const REFRESH_INTERVAL = 30000;   // 30 secondes
const BOT_CYCLE        = 300;     // 5 minutes en secondes

// ============================================================
// ÉTAT GLOBAL
// ============================================================
let chartInstance = null;
let currentMode   = 'value';
let cycleTimer    = null;
let lastOrderIds  = [];
let connLost      = false;
let connTimer     = null;
let lastData      = null;

// ============================================================
// HORLOGES + STATUT MARCHÉ
// ============================================================
function updateClocks() {
    const now  = new Date();
    document.getElementById('clk-paris').textContent =
        now.toLocaleTimeString('fr-FR', { timeZone:'Europe/Paris', hour12:false });
    document.getElementById('clk-ny').textContent =
        now.toLocaleTimeString('fr-FR', { timeZone:'America/New_York', hour12:false });

    const nyD   = new Date(now.toLocaleString('en-US', { timeZone:'America/New_York' }));
    const h     = nyD.getHours(), m = nyD.getMinutes(), day = nyD.getDay();
    const tMin  = h * 60 + m;
    const badge = document.getElementById('mkt-badge');

    if (day >= 1 && day <= 5) {
        if (tMin >= 570 && tMin < 960) {
            badge.innerHTML = `<div class="market-badge market-open"><div class="mkt-dot mkt-dot-open"></div>NYSE Ouvert</div>`;
        } else if ((tMin >= 240 && tMin < 570) || (tMin >= 960 && tMin < 1200)) {
            badge.innerHTML = `<div class="market-badge market-pre"><div class="mkt-dot mkt-dot-pre"></div>Pré/Post-marché</div>`;
        } else {
            badge.innerHTML = `<div class="market-badge market-closed"><div class="mkt-dot mkt-dot-closed"></div>NYSE Fermé</div>`;
        }
    } else {
        badge.innerHTML = `<div class="market-badge market-closed"><div class="mkt-dot mkt-dot-closed"></div>Weekend</div>`;
    }
}
setInterval(updateClocks, 1000);
updateClocks();

// ============================================================
// CONNEXION
// ============================================================
function setConn(ok) {
    const dot  = document.getElementById('conn-dot');
    const text = document.getElementById('conn-text');
    dot.className  = `conn-dot ${ok ? 'conn-online' : 'conn-offline'}`;
    text.textContent = ok ? 'Connecté' : 'Déconnecté';
    text.style.color = ok ? 'var(--accent-green)' : 'var(--accent-red)';
}

// ============================================================
// BRAIN SVG
// ============================================================
function brainSVG() {
    return `<svg class="brain-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path class="brain-fill" d="M30,35 L45,20 L55,20 L70,35 L70,55 L50,75 L30,55 Z"/>
        <circle class="brain-pulse" cx="40" cy="40" r="5"/>
        <circle class="brain-pulse" cx="60" cy="40" r="5"/>
        <path  class="brain-pulse" d="M45,55 Q50,65 55,55"/>
    </svg>`;
}

function buildBrain(state, sourceLabel, sourceColor) {
    const cls   = state==='thinking' ? 'brain-thinking' : state==='done' ? 'brain-done' : 'brain-idle';
    const waves = state==='thinking' ? 'brain-thinking-waves' : '';
    const lbl   = state==='thinking' ? 'Analyse...' : state==='done' ? 'Décision prise' : 'En veille';
    const lCls  = state==='thinking' ? 'brain-s-thinking' : state==='done' ? 'brain-s-done' : 'brain-s-idle';
    return `
    <div class="ai-brain-wrap">
        <div class="brain-container ${waves}">
            ${state==='thinking'?'<div class="brain-wave wave1"></div><div class="brain-wave wave2"></div><div class="brain-wave wave3"></div>':''}
            <div class="${cls}">${brainSVG()}</div>
        </div>
        <div class="brain-status ${lCls}">${lbl}</div>
        <div style="font-size:9px;color:${sourceColor}">${sourceLabel}</div>
    </div>`;
}

// ============================================================
// BLOC IA (FIX : attend un objet, plus une string)
// ============================================================
function buildAiBlock(ai) {
    if (!ai || typeof ai !== 'object' || !ai.decision) {
        return `
        <div class="ai-box">
            <div class="ai-inner">
                ${buildBrain('idle','En attente','#7d8590')}
                <div class="ai-content">
                    <div class="ai-title">Analyse IA</div>
                    <div class="ai-text" style="color:var(--text-secondary);font-style:italic">Aucune analyse disponible.</div>
                </div>
            </div>
        </div>`;
    }

    const decision  = ai.decision  || 'ATTENTE';
    const confiance = ai.confiance || 0;
    const raison    = ai.raison    || '—';
    const source    = ai.source    || 'Système';
    const state     = (decision !== 'ATTENTE' && decision !== 'STOP') ? 'done' : 'idle';
    const srcColor  = source.includes('Gemini') ? 'var(--accent-orange)' : 'var(--text-secondary)';
    const barColor  = confiance >= 70 ? 'var(--accent-green)' : confiance >= 50 ? 'var(--accent-orange)' : 'var(--accent-red)';

    return `
    <div class="ai-box">
        <div class="ai-inner">
            ${buildBrain(state, source, srcColor)}
            <div class="ai-content">
                <div class="ai-title">
                    Analyse IA
                    <span style="color:${srcColor};font-size:10px;font-weight:400">${source}</span>
                </div>
                <div class="ai-text">
                    <span class="dec-badge dec-${decision}">${decision}</span>
                    ${raison}
                </div>
                <div class="conf-row">
                    <span class="conf-label">Confiance</span>
                    <div class="conf-bar-wrap">
                        <div class="conf-bar" id="conf-bar" style="background:${barColor}" data-target="${confiance}%"></div>
                    </div>
                    <span style="font-size:11px;color:${barColor};font-weight:700;min-width:32px">${confiance}%</span>
                </div>
                <div class="next-cycle">
                    <span>Prochain cycle</span>
                    <div class="nc-bar"><div class="nc-fill" id="cycle-fill"></div></div>
                    <span id="cycle-cd">5:00</span>
                </div>
            </div>
        </div>
    </div>`;
}

// ============================================================
// GRAPHIQUE
// ============================================================
function buildChart(history) {
    if (!history || history.length < 2) {
        return `<div style="height:200px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:13px">📊 Le graphique s'affichera après quelques cycles</div>`;
    }
    return `
    <div class="chart-tabs">
        <button class="chart-tab ${currentMode==='value'?'active':''}" onclick="switchChart('value',event)">Valeur du portefeuille</button>
        <button class="chart-tab ${currentMode==='pnl'?'active':''}" onclick="switchChart('pnl',event)">Performance %</button>
    </div>
    <div class="chart-wrap"><canvas id="perfChart"></canvas></div>`;
}

function renderChart(history) {
    if (!history || history.length < 2) return;
    const ctx = document.getElementById('perfChart');
    if (!ctx) return;

    const labels = history.map(h => h.t);
    const values = currentMode === 'value' ? history.map(h => h.v) : history.map(h => h.pnl);
    const last   = values[values.length - 1], first = values[0];
    const pos    = last >= first;
    const lc     = pos ? '#3fb950' : '#f85149';
    const fc     = pos ? 'rgba(63,185,80,.07)' : 'rgba(248,81,73,.07)';

    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

    chartInstance = new Chart(ctx, {
        type:'line',
        data:{ labels, datasets:[{ data:values, borderColor:lc, backgroundColor:fc, borderWidth:2, pointRadius:0, pointHoverRadius:4, fill:true, tension:.3 }] },
        options:{
            responsive:true, maintainAspectRatio:false,
            plugins:{
                legend:{display:false},
                tooltip:{
                    callbacks:{ label: c => currentMode==='value' ? c.parsed.y.toFixed(2)+' €' : (c.parsed.y>=0?'+':'')+c.parsed.y.toFixed(2)+' %' },
                    backgroundColor:'#161b22', borderColor:'#30363d', borderWidth:1,
                    titleColor:'#7d8590', bodyColor:'#e6edf3'
                }
            },
            scales:{
                x:{ grid:{color:'#21262d'}, ticks:{color:'#7d8590',maxTicksLimit:6,font:{size:10}} },
                y:{ grid:{color:'#21262d'}, ticks:{color:'#7d8590',font:{size:10}, callback:v=>currentMode==='value'?v.toFixed(0)+'€':(v>=0?'+':'')+v.toFixed(2)+'%'}, position:'right' }
            }
        }
    });
}

window.switchChart = function(mode, e) {
    currentMode = mode;
    document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
    if (e && e.target) e.target.classList.add('active');
    if (lastData && lastData.history) renderChart(lastData.history);
};

// ============================================================
// ORDRES
// ============================================================
function buildOrdersBlock(orders) {
    if (!orders || orders.length === 0)
        return `<p style="color:var(--text-secondary);font-style:italic;padding:12px">Aucun ordre récent.</p>`;

    const labels = { filled:'Exécuté', partially_filled:'Partiel', new:'En attente', accepted:'En attente', canceled:'Annulé', rejected:'Rejeté', expired:'Expiré' };
    let html = `<div class="table-wrap"><table>
        <thead><tr><th>Heure</th><th>Symbole</th><th>Côté</th><th>Qté</th><th>Prix</th><th>Statut</th></tr></thead>
        <tbody>`;

    orders.forEach((o, i) => {
        const isNew  = !lastOrderIds.includes(o.id) && i === 0;
        const sClass = o.side === 'buy' ? 'side-buy' : 'side-sell';
        const sLabel = o.side === 'buy' ? '▲ ACHAT'  : '▼ VENTE';
        const price  = o.filled_price ? o.filled_price.toFixed(2)+'$' : '—';
        html += `<tr class="${isNew?'row-new':''}">
            <td style="color:var(--text-secondary);font-size:11px">${o.created_at||'--'}</td>
            <td><b>${o.symbol}</b></td>
            <td class="${sClass}">${sLabel}</td>
            <td>${o.filled_qty}/${o.qty}</td>
            <td>${price}</td>
            <td><span class="o-badge o-${o.status}">${labels[o.status]||o.status}</span></td>
        </tr>`;
    });

    html += `</tbody></table></div>`;
    lastOrderIds = orders.map(o => o.id);
    return html;
}

// ============================================================
// FIL D'ACTUALITÉS (NOUVEAU)
// ============================================================
function buildNewsBlock(news) {
    if (!news) {
        return `<div class="news-loading"><div class="spinner" style="width:18px;height:18px;border-width:2px;margin:0"></div>Chargement des actualités...</div>`;
    }
    if (!Array.isArray(news) || news.length === 0) {
        return `<p class="news-empty">Aucune actualité disponible pour le moment.</p>`;
    }

    return `<div class="news-list">${news.map(item => `
        <div class="news-item">
            <div class="news-bullet"></div>
            <div class="news-body">
                <div class="news-title">
                    ${item.link && item.link !== '#'
                        ? `<a href="${item.link}" target="_blank" rel="noopener">${escapeHtml(item.title)}</a>`
                        : escapeHtml(item.title)
                    }
                </div>
                <div class="news-meta">
                    <span class="news-source">${escapeHtml(item.source||'')}</span>
                    <span class="news-time">🕒 ${escapeHtml(item.published||'')}</span>
                </div>
            </div>
        </div>`).join('')}
    </div>`;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// COMPTE À REBOURS
// ============================================================
function startCycleCountdown() {
    if (cycleTimer) clearInterval(cycleTimer);
    let s = 0;
    cycleTimer = setInterval(() => {
        s++;
        const rem  = BOT_CYCLE - (s % BOT_CYCLE);
        const pct  = ((s % BOT_CYCLE) / BOT_CYCLE) * 100;
        const fill = document.getElementById('cycle-fill');
        const cd   = document.getElementById('cycle-cd');
        if (fill) fill.style.width = pct + '%';
        if (cd) { const m = Math.floor(rem/60); const sec = rem%60; cd.textContent = `${m}:${sec.toString().padStart(2,'0')}`; }
    }, 1000);
}

// ============================================================
// FETCH DONNÉES
// ============================================================
function fetchData(showLoading = false) {
    if (showLoading) {
        document.getElementById('main').innerHTML = `<div class="loading"><div class="spinner"></div><p style="color:var(--text-secondary)">Actualisation...</p></div>`;
    }
    if (connTimer) clearTimeout(connTimer);
    connTimer = setTimeout(() => { connLost = true; setConn(false); }, 5000);

    fetch(`${API_URL}/api/state`)
        .then(r => {
            clearTimeout(connTimer);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return r.json();
        })
        .then(data => {
            if (connLost) { connLost = false; setConn(true); }
            lastData = data;
            renderDashboard(data);
            document.getElementById('footer-time').innerHTML = `
                <span>🕒 ${new Date().toLocaleTimeString()}</span>
                <button class="refresh-btn" onclick="forceRefresh()">↻ Actualiser</button>`;
        })
        .catch(err => {
            clearTimeout(connTimer);
            connLost = true;
            setConn(false);
            document.getElementById('main').innerHTML = `
                <div class="error-msg">
                    <div style="font-size:36px;margin-bottom:12px">⚠️</div>
                    <strong>Connexion impossible</strong><br><br>
                    Vérifiez que le serveur Flask tourne sur <code>${API_URL}</code><br>
                    <span style="font-size:11px;color:var(--text-secondary);margin-top:8px;display:block">${err.message}</span>
                    <button onclick="forceRefresh()" class="refresh-btn" style="margin-top:16px">🔄 Réessayer</button>
                </div>`;
            document.getElementById('footer-time').innerHTML = `
                <span style="color:var(--accent-red)">🚫 Connexion perdue</span>
                <button class="refresh-btn" onclick="forceRefresh()">↻ Réessayer</button>`;
        });
}

// ============================================================
// RENDU DASHBOARD
// ============================================================
function renderDashboard(data) {
    const running  = data.status === 'Running';
    const pnlClass = data.daily_pnl >= 0 ? 'profit' : 'loss';
    const pnlSign  = data.daily_pnl >= 0 ? '+' : '';

    // Positions
    let posHtml = `<p style="color:var(--text-secondary);font-style:italic;padding:12px">Aucune position ouverte.</p>`;
    if (data.positions && data.positions.length > 0) {
        posHtml = `<div class="table-wrap"><table>
            <thead><tr><th>Symbole</th><th>Quantité</th><th>P&L</th></tr></thead>
            <tbody>`;
        data.positions.forEach(p => {
            const pc = p.pnl >= 0 ? 'profit' : 'loss';
            posHtml += `<tr><td><b>${p.symbol}</b></td><td>${p.qty}</td><td class="${pc}">${p.pnl >= 0?'+':''}${p.pnl.toFixed(2)}%</td></tr>`;
        });
        posHtml += `</tbody></table></div>`;
    }

    // Performance totale
    let gainTotal = '';
    if (data.history && data.history.length > 1) {
        const first  = data.history[0].v;
        const last   = data.history[data.history.length-1].v;
        const diff   = last - first;
        const diffPct= ((diff/first)*100).toFixed(2);
        gainTotal = `<span class="${diff>=0?'profit':'loss'}" style="font-size:13px;margin-left:10px">${diff>=0?'+':''}${diff.toFixed(2)}€ (${diff>=0?'+':''}${diffPct}%)</span>`;
    }

    document.getElementById('main').innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px">
            <div>Statut : <span class="status-badge ${running?'status-running':'status-stopped'}">${data.status}</span></div>
            <div style="color:var(--text-secondary);font-size:12px">${data.message||''}</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">💰 Valeur totale</div>
                <div class="stat-value">${(data.portfolio_value||0).toFixed(2)} €</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">💵 Cash disponible</div>
                <div class="stat-value">${(data.cash||0).toFixed(2)} €</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📊 Performance jour</div>
                <div class="stat-value ${pnlClass}">${pnlSign}${(data.daily_pnl||0).toFixed(2)} %</div>
            </div>
        </div>

        <div class="section-title">📈 Positions en cours ${gainTotal}</div>
        ${posHtml}

        <div class="section-title">📉 Performance en temps réel</div>
        ${buildChart(data.history||[])}

        ${buildAiBlock(data.ai_analysis)}

        <div class="section-title">📋 Ordres récents</div>
        ${buildOrdersBlock(data.last_orders)}

        <div class="section-title">📰 Actualités financières</div>
        ${buildNewsBlock(data.news)}
    `;

    // Graphique
    setTimeout(() => { if (data.history) renderChart(data.history); }, 50);

    // Barre de confiance
    setTimeout(() => {
        const bar = document.getElementById('conf-bar');
        if (bar && bar.dataset.target) bar.style.width = bar.dataset.target;
    }, 200);

    startCycleCountdown();
}

// ============================================================
// INITIALISATION
// ============================================================
window.forceRefresh = function() { fetchData(true); };

fetchData();
setInterval(() => fetchData(), REFRESH_INTERVAL);
setInterval(() => { if (connLost) fetchData(); }, 10000);
</script>
</body>
</html>
